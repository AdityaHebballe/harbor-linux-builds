name: Build Harbor Linux Beta

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Upstream beta ref or commit to build.
        required: true
        default: beta-branch
        type: string
  schedule:
    - cron: "23 */5 * * *"

permissions:
  contents: write

concurrency:
  group: harbor-linux-beta-${{ inputs.ref || 'beta-branch' }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve upstream beta commit
    runs-on: ubuntu-24.04
    outputs:
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve beta commit and version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_REF: ${{ inputs.ref || 'beta-branch' }}
        run: |
          set -euo pipefail

          source_ref="$(gh api "repos/harborstremio/harbor/commits/${INPUT_REF}" --jq '.sha')"
          version="$(gh api "repos/harborstremio/harbor/contents/package.json?ref=${source_ref}" --jq '.content' | tr -d '\n' | base64 --decode | jq -r '.version')"
          compare_status="$(gh api "repos/harborstremio/harbor/compare/7eaf9d4...${source_ref}" --jq '.status')"

          if ! echo "${compare_status}" | grep -Eq '^(identical|ahead)$'; then
            echo "${INPUT_REF} does not contain Linux build fix 7eaf9d4." >&2
            exit 1
          fi

          if [ -z "${version}" ] || [ "${version}" = "null" ]; then
            echo "Could not read the Harbor version from ${source_ref}." >&2
            exit 1
          fi

          short_sha="${source_ref:0:12}"
          echo "source_ref=${source_ref}" >> "${GITHUB_OUTPUT}"
          echo "tag=beta-v${version}-${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build beta Linux bundles
    needs: resolve
    uses: ./.github/workflows/build-linux-release.yml
    with:
      source_ref: ${{ needs.resolve.outputs.source_ref }}
      tag: ${{ needs.resolve.outputs.tag }}
      version: ${{ needs.resolve.outputs.version }}
      channel: beta
    secrets: inherit

  update-readme:
    name: Update beta download link
    needs: [resolve, build]
    if: always() && needs.resolve.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build repository
        uses: actions/checkout@v7.0.0
        with:
          ref: main

      - name: Update beta release links
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail

          if ! gh release view "${TAG}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
            echo "No beta release was published; README unchanged."
            exit 0
          fi

          node <<'EOF'
          const fs = require("node:fs");

          const readmePath = "README.md";
          const releaseUrl = `https://github.com/${process.env.REPOSITORY}/releases/tag/${process.env.TAG}`;
          const readme = fs.readFileSync(readmePath, "utf8");
          const updatedReadme = readme.replace(
            /https:\/\/github\.com\/AdityaHebballe\/harbor-linux-builds\/releases\/tag\/beta-v[^)"\s<]+/g,
            releaseUrl,
          );

          if (updatedReadme === readme) {
            throw new Error("No beta release links found in README.md");
          }

          fs.writeFileSync(readmePath, updatedReadme);
          EOF

          if git diff --quiet -- README.md; then
            echo "README beta link is already current."
            exit 0
          fi

          git config user.name "Aditya Hebballe"
          git config user.email "45328110+AdityaHebballe@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update beta release link"
          git push origin HEAD:main
