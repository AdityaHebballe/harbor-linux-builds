name: Build Harbor Linux Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Upstream Harbor tag to build, for example v0.9.12. Leave empty for latest release.
        required: false
        type: string
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: harbor-linux-${{ github.event.inputs.tag || 'latest' }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve upstream tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      contains_linux_fix: ${{ steps.resolve.outputs.contains_linux_fix }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_TAG}" ]; then
            tag="${INPUT_TAG}"
          else
            tag="$(gh api repos/harborstremio/harbor/releases/latest --jq '.tag_name')"
          fi

          if [ -z "${tag}" ] || [ "${tag}" = "null" ]; then
            echo "Could not resolve upstream tag" >&2
            exit 1
          fi

          version="${tag#v}"
          tag_commit="$(gh api "repos/harborstremio/harbor/git/ref/tags/${tag}" --jq '.object.sha')"
          compare_status="$(gh api "repos/harborstremio/harbor/compare/7eaf9d4...${tag_commit}" --jq '.status')"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          if echo "${compare_status}" | grep -Eq '^(identical|ahead)$'; then
            echo "contains_linux_fix=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Upstream tag ${tag} does not contain Linux build fix 7eaf9d4; skipping."
            echo "contains_linux_fix=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check existing release
        id: check
        if: steps.resolve.outputs.contains_linux_fix == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Release ${TAG} already exists, but manual run will rebuild it."
              echo "should_build=true" >> "${GITHUB_OUTPUT}"
            else
              echo "Release ${TAG} already exists; nothing to do."
              echo "should_build=false" >> "${GITHUB_OUTPUT}"
            fi
          else
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          fi

  build:
    name: Build Linux bundles
    needs: resolve
    if: needs.resolve.outputs.contains_linux_fix == 'true' && needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Harbor
        uses: actions/checkout@v7.0.0
        with:
          repository: harborstremio/harbor
          ref: ${{ needs.resolve.outputs.tag }}
          path: harbor

      - name: Install Linux dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            ffmpeg \
            libarchive-tools \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libmpv-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            yt-dlp

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: harbor/pnpm-lock.yaml

      - name: Prepare Linux build
        working-directory: harbor
        run: |
          set -euo pipefail

          node <<'EOF'
          const fs = require('fs');
          const tauriConfigPath = 'src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
          config.bundle.createUpdaterArtifacts = false;
          fs.writeFileSync(tauriConfigPath, `${JSON.stringify(config, null, 2)}\n`);

          const packagePath = 'package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.pnpm = packageJson.pnpm || {};
          packageJson.pnpm.onlyBuiltDependencies = Array.from(
            new Set([...(packageJson.pnpm.onlyBuiltDependencies || []), 'esbuild'])
          );
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          EOF

          mkdir -p src-tauri/binaries
          ln -sf /usr/bin/ffmpeg src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          ln -sf /usr/bin/ffprobe src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          ln -sf /usr/bin/yt-dlp src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu

      - name: Install JavaScript dependencies
        working-directory: harbor
        run: pnpm install --frozen-lockfile

      - name: Build Debian bundle
        working-directory: harbor
        run: pnpm tauri build --target x86_64-unknown-linux-gnu --bundles deb

      - name: Validate Linux library ABI
        run: |
          set -euo pipefail

          deb="$(find harbor/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb -type f -name '*.deb' | head -n 1)"
          if [ -z "${deb}" ]; then
            echo "No Debian bundle was produced" >&2
            exit 1
          fi

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          dpkg-deb -x "${deb}" "${tmpdir}"

          readelf -d "${tmpdir}/usr/bin/harbor" | grep 'Shared library: \[libmpv.so.2\]'
          if readelf -d "${tmpdir}/usr/bin/harbor" | grep -q 'Shared library: \[libmpv.so.1\]'; then
            echo "Harbor is linked against libmpv.so.1; Arch mpv provides libmpv.so.2." >&2
            exit 1
          fi

      - name: Collect artifacts
        id: artifacts
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist

          deb="$(find harbor/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb -type f -name '*.deb' | head -n 1)"
          if [ -z "${deb}" ]; then
            echo "No Debian bundle was produced" >&2
            exit 1
          fi

          asset="Harbor_${VERSION}_amd64.deb"
          cp -v "${deb}" "dist/${asset}"

          cd dist
          sha256sum * > "SHA256SUMS-${VERSION}.txt"
          sha256="$(sha256sum "${asset}" | awk '{print $1}')"
          echo "deb_asset=${asset}" >> "${GITHUB_OUTPUT}"
          echo "deb_sha256=${sha256}" >> "${GITHUB_OUTPUT}"
          ls -lh

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: Harbor Linux ${{ needs.resolve.outputs.tag }}
          body: |
            Unofficial Linux build of Harbor from upstream tag `${{ needs.resolve.outputs.tag }}`.

            Source: https://github.com/harborstremio/harbor/tree/${{ needs.resolve.outputs.tag }}

            These binaries are built by this repository's GitHub Actions workflow, not by upstream Harbor.
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true

      - name: Configure AUR SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${AUR_SSH_PRIVATE_KEY}" ]; then
            echo "AUR_SSH_PRIVATE_KEY is not set." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/aur
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF

      - name: Update AUR package
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          TAG: ${{ needs.resolve.outputs.tag }}
          DEB_ASSET: ${{ steps.artifacts.outputs.deb_asset }}
          DEB_SHA256: ${{ steps.artifacts.outputs.deb_sha256 }}
        run: |
          set -euo pipefail

          tmpdir="$(mktemp -d)"
          git clone ssh://aur@aur.archlinux.org/harbor-stremio-bin.git "${tmpdir}"

          pkgrel=1
          if [ -f "${tmpdir}/PKGBUILD" ]; then
            current_pkgver="$(awk -F= '/^pkgver=/{print $2; exit}' "${tmpdir}/PKGBUILD")"
            current_pkgrel="$(awk -F= '/^pkgrel=/{print $2; exit}' "${tmpdir}/PKGBUILD")"
            if [ "${current_pkgver}" = "${VERSION}" ] && echo "${current_pkgrel}" | grep -Eq '^[0-9]+$'; then
              pkgrel="$((current_pkgrel + 1))"
            fi
          fi

          cat > "${tmpdir}/PKGBUILD" <<EOF
          # Maintainer: Aditya Hebballe <adityahebballe@proton.me>

          pkgname=harbor-stremio-bin
          _pkgname=harbor
          pkgver=${VERSION}
          pkgrel=${pkgrel}
          pkgdesc='A Stremio client built for adventure (binary release)'
          arch=('x86_64')
          url='https://github.com/harborstremio/harbor'
          license=('MIT')

          depends=(
            'ffmpeg'
            'gst-libav'
            'gst-plugins-bad'
            'gst-plugins-good'
            'gtk3'
            'libayatana-appindicator'
            'mpv'
            'webkit2gtk-4.1'
            'yt-dlp'
          )

          makedepends=('libarchive')

          provides=('harbor-stremio' 'harbor')
          conflicts=('harbor-stremio' 'harbor' 'harbor-stremio-git')

          source=("Harbor_\${pkgver}-\${pkgrel}_amd64.deb::https://github.com/AdityaHebballe/harbor-linux-builds/releases/download/v\${pkgver}/${DEB_ASSET}")
          sha256sums=('${DEB_SHA256}')

          package() {
            rm -rf "\$srcdir/deb-extract"
            mkdir -p "\$srcdir/deb-extract"
            bsdtar --no-same-owner -xf "\$srcdir/Harbor_\${pkgver}-\${pkgrel}_amd64.deb" -C "\$srcdir/deb-extract"

            local data_archive
            data_archive="\$(find "\$srcdir/deb-extract" -maxdepth 1 -type f -name 'data.tar.*' | head -n 1)"
            if [[ -z "\$data_archive" ]]; then
              echo "Debian data archive not found" >&2
              return 1
            fi

            bsdtar --no-same-owner -xf "\$data_archive" -C "\$pkgdir"

            rm -f "\$pkgdir/usr/bin/ffmpeg" \\
                  "\$pkgdir/usr/bin/ffprobe" \\
                  "\$pkgdir/usr/bin/yt-dlp"

            if [[ -x "\$pkgdir/usr/bin/harbor" && ! -e "\$pkgdir/usr/bin/harbor-stremio" ]]; then
              ln -s harbor "\$pkgdir/usr/bin/harbor-stremio"
            fi
          }
          EOF

          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${tmpdir}:/workspace" \
            -w /workspace \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm libarchive
              groupadd -g "$HOST_GID" builder || true
              useradd -m -u "$HOST_UID" -g "$HOST_GID" builder
              chown -R builder:"$HOST_GID" /workspace
              runuser -u builder -- makepkg --printsrcinfo > .SRCINFO
            '

          cd "${tmpdir}"
          if git diff --quiet; then
            echo "AUR already current."
            exit 0
          fi

          git config user.name "Aditya Hebballe"
          git config user.email "adityahebballe@proton.me"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push
