name: Build Harbor Linux Release

on:
  workflow_call:
    inputs:
      source_ref:
        description: Harbor commit or ref to build.
        required: true
        type: string
      tag:
        description: Release tag to create in this repository.
        required: true
        type: string
      version:
        description: Harbor package version.
        required: true
        type: string
      channel:
        description: Package channel.
        required: false
        default: stable
        type: string
      build_scope:
        description: Build all Linux release formats or only rebuild the AppImage.
        required: false
        default: all
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Upstream Harbor tag to build, for example v0.9.12. Leave empty for latest release.
        required: false
        type: string
      build_scope:
        description: Build all Linux release formats or only rebuild the AppImage.
        required: true
        type: choice
        default: all
        options:
          - all
          - appimage
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: harbor-linux-${{ inputs.tag || 'latest' }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve upstream tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      channel: ${{ steps.resolve.outputs.channel }}
      aur_package: ${{ steps.resolve.outputs.aur_package }}
      contains_linux_fix: ${{ steps.resolve.outputs.contains_linux_fix }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_CHANNEL: ${{ inputs.channel || 'stable' }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_SOURCE_REF}" ]; then
            tag="${INPUT_TAG}"
            version="${INPUT_VERSION}"
            source_ref="${INPUT_SOURCE_REF}"
            contains_linux_fix=true
          elif [ -n "${INPUT_TAG}" ]; then
            tag="${INPUT_TAG}"
            source_ref="${tag}"
          else
            tag="$(gh api repos/harborstremio/harbor/releases/latest --jq '.tag_name')"
            source_ref="${tag}"
          fi

          if [ -z "${tag}" ] || [ "${tag}" = "null" ]; then
            echo "Could not resolve upstream tag" >&2
            exit 1
          fi

          if [ -z "${INPUT_SOURCE_REF}" ]; then
            version="${tag#v}"
            tag_commit="$(gh api "repos/harborstremio/harbor/git/ref/tags/${tag}" --jq '.object.sha')"
            compare_status="$(gh api "repos/harborstremio/harbor/compare/7eaf9d4...${tag_commit}" --jq '.status')"
            if echo "${compare_status}" | grep -Eq '^(identical|ahead)$'; then
              contains_linux_fix=true
            else
              echo "Upstream tag ${tag} does not contain Linux build fix 7eaf9d4; skipping."
              contains_linux_fix=false
            fi
          fi

          case "${INPUT_CHANNEL}" in
            stable)
              aur_package=harbor-stremio-bin
              ;;
            beta)
              aur_package=harbor-stremio-beta-bin
              ;;
            *)
              echo "Unsupported package channel: ${INPUT_CHANNEL}" >&2
              exit 1
              ;;
          esac

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "source_ref=${source_ref}" >> "${GITHUB_OUTPUT}"
          echo "channel=${INPUT_CHANNEL}" >> "${GITHUB_OUTPUT}"
          echo "aur_package=${aur_package}" >> "${GITHUB_OUTPUT}"
          echo "contains_linux_fix=${contains_linux_fix}" >> "${GITHUB_OUTPUT}"

      - name: Check existing release
        id: check
        if: steps.resolve.outputs.contains_linux_fix == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Release ${TAG} already exists, but manual run will rebuild it."
              echo "should_build=true" >> "${GITHUB_OUTPUT}"
            else
              echo "Release ${TAG} already exists; nothing to do."
              echo "should_build=false" >> "${GITHUB_OUTPUT}"
            fi
          else
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          fi

  build:
    name: Build Linux bundles
    needs: resolve
    if: needs.resolve.outputs.contains_linux_fix == 'true' && needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Harbor
        uses: actions/checkout@v7.0.0
        with:
          repository: harborstremio/harbor
          ref: ${{ needs.resolve.outputs.source_ref }}
          path: harbor

      - name: Install Linux dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            ffmpeg \
            libarchive-tools \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libmpv-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm \
            xz-utils \
            yt-dlp

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.9.0

      - name: Install Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: harbor/pnpm-lock.yaml

      - name: Prepare Linux build
        working-directory: harbor
        run: |
          set -euo pipefail

          node <<'EOF'
          const fs = require('fs');
          const tauriConfigPath = 'src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
          config.bundle.createUpdaterArtifacts = false;
          fs.writeFileSync(tauriConfigPath, `${JSON.stringify(config, null, 2)}\n`);

          const workspacePath = 'pnpm-workspace.yaml';
          let workspace = fs.existsSync(workspacePath)
            ? fs.readFileSync(workspacePath, 'utf8')
            : '';
          const setAllowBuild = (name, value) => {
            const entry = new RegExp(`^(\\s*)${name}:.*$`, 'm');
            if (entry.test(workspace)) {
              workspace = workspace.replace(entry, `$1${name}: ${value}`);
              return;
            }
            if (/^allowBuilds:\s*$/m.test(workspace)) {
              workspace = workspace.replace(/^allowBuilds:\s*$/m, `allowBuilds:\n  ${name}: ${value}`);
              return;
            }
            workspace += `${workspace.endsWith('\n') || !workspace ? '' : '\n'}allowBuilds:\n  ${name}: ${value}\n`;
          };
          setAllowBuild('esbuild', 'true');
          setAllowBuild('protobufjs', 'false');
          fs.writeFileSync(workspacePath, workspace);
          EOF

      - name: Install JavaScript dependencies
        working-directory: harbor
        run: |
          pnpm install --lockfile-only --no-frozen-lockfile
          pnpm install --frozen-lockfile

      - name: Fetch bundled build assets
        working-directory: harbor
        run: |
          set -euo pipefail

          if node -e "process.exit(require('./package.json').scripts?.setup ? 0 : 1)"; then
            pnpm run setup
          else
            if node -e "process.exit(require('./package.json').scripts?.['setup:fonts'] ? 0 : 1)"; then
              pnpm run setup:fonts
            fi
            mkdir -p src-tauri/binaries
            ln -sf /usr/bin/ffmpeg src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
            ln -sf /usr/bin/ffprobe src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
            ln -sf /usr/bin/yt-dlp src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu
          fi

      - name: Build Debian bundle
        if: inputs.build_scope != 'appimage'
        working-directory: harbor
        run: pnpm tauri:build:linux-system -- --target x86_64-unknown-linux-gnu --bundles deb

      - name: Build RPM bundle
        if: inputs.build_scope != 'appimage'
        working-directory: harbor
        run: pnpm tauri:build:linux-system -- --target x86_64-unknown-linux-gnu --bundles rpm

      - name: Build AppImage bundle
        working-directory: harbor
        env:
          NO_STRIP: "true"
        run: pnpm tauri build --target x86_64-unknown-linux-gnu --bundles appimage

      - name: Validate Linux library ABI
        if: inputs.build_scope != 'appimage'
        run: |
          set -euo pipefail

          deb="$(find harbor/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb -type f -name '*.deb' | head -n 1)"
          if [ -z "${deb}" ]; then
            echo "No Debian bundle was produced" >&2
            exit 1
          fi

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          dpkg-deb -x "${deb}" "${tmpdir}"

          readelf -d "${tmpdir}/usr/bin/harbor" | grep 'Shared library: \[libmpv.so.2\]'
          if readelf -d "${tmpdir}/usr/bin/harbor" | grep -q 'Shared library: \[libmpv.so.1\]'; then
            echo "Harbor is linked against libmpv.so.1; Arch mpv provides libmpv.so.2." >&2
            exit 1
          fi

      - name: Collect artifacts
        id: artifacts
        env:
          BUILD_SCOPE: ${{ inputs.build_scope || 'all' }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.resolve.outputs.tag }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist

          appimage="$(find harbor/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage -type f -name '*.AppImage' | head -n 1)"
          if [ -z "${appimage}" ]; then
            echo "No AppImage bundle was produced" >&2
            exit 1
          fi

          appimage_asset="Harbor_${VERSION}_amd64.AppImage"
          cp -v "${appimage}" "dist/${appimage_asset}"

          if [ "${BUILD_SCOPE}" = "appimage" ]; then
            checksum_asset="SHA256SUMS-${VERSION}.txt"
            if gh release view "${TAG}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
              gh release download "${TAG}" \
                --repo "${REPOSITORY}" \
                --pattern "${checksum_asset}" \
                --dir dist \
                --clobber || true
            fi
            touch "dist/${checksum_asset}"
            awk -v asset="${appimage_asset}" '$2 != asset' "dist/${checksum_asset}" > "dist/${checksum_asset}.tmp"
            mv "dist/${checksum_asset}.tmp" "dist/${checksum_asset}"
            sha256sum "dist/${appimage_asset}" | sed 's|dist/||' >> "dist/${checksum_asset}"
            sort -k2 -o "dist/${checksum_asset}" "dist/${checksum_asset}"
            ls -lh dist
            exit 0
          fi

          deb="$(find harbor/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb -type f -name '*.deb' | head -n 1)"
          if [ -z "${deb}" ]; then
            echo "No Debian bundle was produced" >&2
            exit 1
          fi

          rpm="$(find harbor/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm -type f -name '*.rpm' | head -n 1)"
          if [ -z "${rpm}" ]; then
            echo "No RPM bundle was produced" >&2
            exit 1
          fi

          deb_asset="Harbor_${VERSION}_amd64.deb"
          rpm_asset="Harbor-${VERSION}-1.x86_64.rpm"
          cp -v "${deb}" "dist/${deb_asset}"
          cp -v "${rpm}" "dist/${rpm_asset}"

          cd dist
          sha256sum * > "SHA256SUMS-${VERSION}.txt"
          deb_sha256="$(sha256sum "${deb_asset}" | awk '{print $1}')"
          echo "deb_asset=${deb_asset}" >> "${GITHUB_OUTPUT}"
          echo "deb_sha256=${deb_sha256}" >> "${GITHUB_OUTPUT}"
          ls -lh

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: Harbor Linux ${{ needs.resolve.outputs.tag }}
          body: |
            Unofficial ${{ needs.resolve.outputs.channel }} Linux build of Harbor.

            Source: https://github.com/harborstremio/harbor/tree/${{ needs.resolve.outputs.source_ref }}

            These binaries are built by this repository's GitHub Actions workflow, not by upstream Harbor.
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: ${{ needs.resolve.outputs.channel == 'stable' }}
          prerelease: ${{ needs.resolve.outputs.channel == 'beta' }}
          overwrite_files: true

      - name: Verify published Debian asset
        id: published_deb
        if: inputs.build_scope != 'appimage'
        env:
          DEB_ASSET: ${{ steps.artifacts.outputs.deb_asset }}
          EXPECTED_SHA256: ${{ steps.artifacts.outputs.deb_sha256 }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          gh release download "${TAG}" \
            --repo "${REPOSITORY}" \
            --pattern "${DEB_ASSET}" \
            --dir "${tmpdir}"

          published_sha256="$(sha256sum "${tmpdir}/${DEB_ASSET}" | awk '{print $1}')"
          if [ "${published_sha256}" != "${EXPECTED_SHA256}" ]; then
            echo "Published Debian asset does not match the built artifact." >&2
            echo "Expected:  ${EXPECTED_SHA256}" >&2
            echo "Published: ${published_sha256}" >&2
            exit 1
          fi

          echo "sha256=${published_sha256}" >> "${GITHUB_OUTPUT}"

      - name: Configure AUR SSH
        if: inputs.build_scope != 'appimage'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${AUR_SSH_PRIVATE_KEY}" ]; then
            echo "AUR_SSH_PRIVATE_KEY is not set." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/aur
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF

      - name: Update AUR package
        if: inputs.build_scope != 'appimage'
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          TAG: ${{ needs.resolve.outputs.tag }}
          CHANNEL: ${{ needs.resolve.outputs.channel }}
          AUR_PACKAGE: ${{ needs.resolve.outputs.aur_package }}
          DEB_ASSET: ${{ steps.artifacts.outputs.deb_asset }}
          DEB_SHA256: ${{ steps.published_deb.outputs.sha256 }}
        run: |
          set -euo pipefail

          tmpdir="$(mktemp -d)"
          git clone "ssh://aur@aur.archlinux.org/${AUR_PACKAGE}.git" "${tmpdir}"

          if [ "${CHANNEL}" = "beta" ]; then
            package_desc='A Stremio client built for adventure (beta binary release)'
            package_provides="provides=('harbor-stremio-beta' 'harbor')"
            package_conflicts="conflicts=('harbor-stremio-bin' 'harbor-stremio' 'harbor' 'harbor-stremio-git')"
          else
            package_desc='A Stremio client built for adventure (binary release)'
            package_provides="provides=('harbor-stremio' 'harbor')"
            package_conflicts="conflicts=('harbor-stremio' 'harbor' 'harbor-stremio-git')"
          fi

          pkgrel=1
          if [ -f "${tmpdir}/PKGBUILD" ]; then
            current_pkgver="$(awk -F= '/^pkgver=/{print $2; exit}' "${tmpdir}/PKGBUILD")"
            current_pkgrel="$(awk -F= '/^pkgrel=/{print $2; exit}' "${tmpdir}/PKGBUILD")"
            if [ "${current_pkgver}" = "${VERSION}" ] && echo "${current_pkgrel}" | grep -Eq '^[0-9]+$'; then
              pkgrel="$((current_pkgrel + 1))"
            fi
          fi

          cat > "${tmpdir}/PKGBUILD" <<EOF
          # Maintainer: Aditya Hebballe <adityahebballe@proton.me>

          pkgname=${AUR_PACKAGE}
          _pkgname=harbor
          pkgver=${VERSION}
          pkgrel=${pkgrel}
          pkgdesc='${package_desc}'
          arch=('x86_64')
          url='https://github.com/harborstremio/harbor'
          license=('MIT')

          depends=(
            'ffmpeg'
            'gst-libav'
            'gst-plugins-bad'
            'gst-plugins-good'
            'gtk3'
            'libayatana-appindicator'
            'mpv'
            'webkit2gtk-4.1'
            'yt-dlp'
          )

          makedepends=('libarchive')

          ${package_provides}
          ${package_conflicts}

          source=("Harbor_\${pkgver}-\${pkgrel}_amd64.deb::https://github.com/AdityaHebballe/harbor-linux-builds/releases/download/${TAG}/${DEB_ASSET}")
          sha256sums=('${DEB_SHA256}')

          package() {
            rm -rf "\$srcdir/deb-extract"
            mkdir -p "\$srcdir/deb-extract"
            bsdtar --no-same-owner -xf "\$srcdir/Harbor_\${pkgver}-\${pkgrel}_amd64.deb" -C "\$srcdir/deb-extract"

            local data_archive
            data_archive="\$(find "\$srcdir/deb-extract" -maxdepth 1 -type f -name 'data.tar.*' | head -n 1)"
            if [[ -z "\$data_archive" ]]; then
              echo "Debian data archive not found" >&2
              return 1
            fi

            bsdtar --no-same-owner -xf "\$data_archive" -C "\$pkgdir"

            rm -f "\$pkgdir/usr/bin/ffmpeg" \\
                  "\$pkgdir/usr/bin/ffprobe" \\
                  "\$pkgdir/usr/bin/yt-dlp"

            if [[ -x "\$pkgdir/usr/bin/harbor" && ! -e "\$pkgdir/usr/bin/harbor-stremio" ]]; then
              ln -s harbor "\$pkgdir/usr/bin/harbor-stremio"
            fi
          }
          EOF

          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${tmpdir}:/workspace" \
            -w /workspace \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm libarchive
              groupadd -g "$HOST_GID" builder || true
              useradd -m -u "$HOST_UID" -g "$HOST_GID" builder
              chown -R builder:"$HOST_GID" /workspace
              runuser -u builder -- makepkg --printsrcinfo > .SRCINFO
            '

          cd "${tmpdir}"
          if git diff --quiet; then
            echo "AUR already current."
            exit 0
          fi

          git config user.name "Aditya Hebballe"
          git config user.email "adityahebballe@proton.me"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push

  flatpak:
    name: Build Flatpak bundle
    needs: [resolve, build]
    if: needs.resolve.outputs.contains_linux_fix == 'true' && needs.resolve.outputs.should_build == 'true' && inputs.build_scope != 'appimage'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Harbor
        uses: actions/checkout@v7.0.0
        with:
          repository: harborstremio/harbor
          ref: ${{ needs.resolve.outputs.source_ref }}
          path: harbor

      - name: Install Flatpak tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream desktop-file-utils

      - name: Configure Flathub runtimes
        run: |
          set -euo pipefail
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.gnome.Platform//49 \
            org.gnome.Sdk//49 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08 \
            org.freedesktop.Sdk.Extension.node22//25.08 \
            org.freedesktop.Sdk.Extension.ffmpeg-full//25.08

      - name: Validate Flatpak metadata
        working-directory: harbor
        run: |
          set -euo pipefail
          desktop-file-validate flatpak/site.harbor.Harbor.desktop
          appstreamcli validate --no-net flatpak/site.harbor.Harbor.metainfo.xml
          flatpak-builder --show-manifest flatpak/site.harbor.Harbor.yml >/dev/null

      - name: Prepare Flatpak source
        working-directory: harbor
        run: |
          set -euo pipefail

          node <<'EOF'
          const fs = require('fs');
          const workspacePath = 'pnpm-workspace.yaml';
          let workspace = fs.readFileSync(workspacePath, 'utf8');
          const setAllowBuild = (name, value) => {
            const entry = new RegExp(`^(\\s*)${name}:.*$`, 'm');
            if (entry.test(workspace)) {
              workspace = workspace.replace(entry, `$1${name}: ${value}`);
              return;
            }
            workspace = workspace.replace(/^allowBuilds:\s*$/m, `allowBuilds:\n  ${name}: ${value}`);
          };
          setAllowBuild('esbuild', 'true');
          setAllowBuild('protobufjs', 'false');
          fs.writeFileSync(workspacePath, workspace);
          EOF

      - name: Build Flatpak bundle
        working-directory: harbor
        run: |
          set -euo pipefail
          flatpak-builder --user --force-clean --repo=/tmp/harbor-flatpak-repo /tmp/harbor-flatpak-build flatpak/site.harbor.Harbor.yml
          flatpak build-bundle /tmp/harbor-flatpak-repo \
            "../Harbor_${{ needs.resolve.outputs.version }}_x86_64.flatpak" \
            site.harbor.Harbor

      - name: Validate Flatpak bundle
        run: |
          set -euo pipefail
          flatpak build-import-bundle --update-appstream --no-update-summary \
            /tmp/harbor-flatpak-validation-repo \
            "Harbor_${{ needs.resolve.outputs.version }}_x86_64.flatpak"

      - name: Attach Flatpak bundle to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
          ASSET: Harbor_${{ needs.resolve.outputs.version }}_x86_64.flatpak
        run: gh release upload "${TAG}" "${ASSET}" --repo "${REPOSITORY}" --clobber
