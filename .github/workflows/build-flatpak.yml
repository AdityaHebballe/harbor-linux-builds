name: Build Harbor Flatpak

on:
  workflow_call:
    inputs:
      source_ref:
        description: Harbor commit or ref to build.
        required: true
        type: string
      source_repo:
        description: 'GitHub repository to check out Harbor source from (owner/name). Leave blank for harborstremio/harbor.'
        required: false
        type: string
      tag:
        description: Existing release tag to receive the Flatpak bundle.
        required: true
        type: string
      version:
        description: Harbor package version.
        required: false
        type: string
      channel:
        description: Flatpak branch to build.
        required: false
        default: stable
        type: string
  workflow_dispatch:
    inputs:
      source_ref:
        description: Upstream Harbor commit or ref to build.
        required: true
        type: string
      source_repo:
        description: Where to check out Harbor source from.
        required: false
        default: upstream
        type: choice
        options:
          - upstream
          - fork
      tag:
        description: Existing release tag to receive the Flatpak bundle.
        required: true
        type: string
      version:
        description: Harbor package version. Leave blank to read it from the source ref.
        required: false
        type: string
      channel:
        description: Flatpak branch to build.
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write

concurrency:
  group: harbor-flatpak-sources
  cancel-in-progress: false

jobs:
  build:
    name: Build and attach Flatpak bundle
    runs-on: ubuntu-24.04
    steps:
      - name: Verify target release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          gh release view "${TAG}" --repo "${REPOSITORY}" >/dev/null

      - name: Validate Flatpak channel
        env:
          CHANNEL: ${{ inputs.channel || 'stable' }}
        run: |
          set -euo pipefail
          case "${CHANNEL}" in
            stable|beta) ;;
            *)
              echo "Unsupported Flatpak channel: ${CHANNEL}" >&2
              exit 1
              ;;
          esac

      - name: Resolve source repository and ref
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_SOURCE_REPO: ${{ inputs.source_repo }}
        run: |
          set -euo pipefail

          case "${INPUT_SOURCE_REPO}" in
            ''|upstream|harborstremio/harbor)
              source_repo="harborstremio/harbor"
              ;;
            fork)
              source_repo="AdityaHebballe/harbor"
              ;;
            *)
              source_repo="${INPUT_SOURCE_REPO}"
              ;;
          esac

          source_ref="$(gh api "repos/${source_repo}/commits/${INPUT_SOURCE_REF}" --jq '.sha')"
          echo "source_repo=${source_repo}" >> "${GITHUB_OUTPUT}"
          echo "source_ref=${source_ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout downstream Flatpak configuration
        uses: actions/checkout@v7.0.0
        with:
          ref: main
          path: packaging

      - name: Checkout Harbor
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ steps.source.outputs.source_repo }}
          ref: ${{ steps.source.outputs.source_ref }}
          path: harbor

      - name: Overlay downstream Flatpak configuration
        run: |
          set -euo pipefail
          rsync -a --delete packaging/flatpak/ harbor/flatpak/
          install -Dm644 packaging/flatpak/tauri.flatpak.conf.json harbor/src-tauri/tauri.flatpak.conf.json

      - name: Resolve package version
        id: package
        working-directory: harbor
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION}"
          if [ -z "${version}" ]; then
            version="$(node -p "require('./package.json').version")"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install Flatpak tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream desktop-file-utils ostree python3-venv

      - name: Configure Flathub runtimes
        run: |
          set -euo pipefail
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.gnome.Platform//49 \
            org.gnome.Sdk//49 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08 \
            org.freedesktop.Sdk.Extension.node22//25.08

      - name: Refresh downstream Flatpak sources
        working-directory: harbor
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          release_date="$(gh release view "${TAG}" --repo "${REPOSITORY}" --json publishedAt --jq '.publishedAt' | cut -dT -f1)"
          RELEASE_DATE="${release_date}" bash flatpak/update-flatpak.sh
          printf '%s\n' '${{ steps.source.outputs.source_ref }}' > flatpak/source-ref.txt

      - name: Persist downstream Flatpak sources
        working-directory: packaging
        run: |
          set -euo pipefail
          rsync -a --delete ../harbor/flatpak/ flatpak/
          git add flatpak
          if git diff --cached --quiet; then
            echo "Downstream Flatpak sources are already current."
            exit 0
          fi
          git config user.name "Aditya Hebballe"
          git config user.email "45328110+AdityaHebballe@users.noreply.github.com"
          git commit -m "build(flatpak): sync ${{ steps.package.outputs.version }}"
          git push origin HEAD:main

      - name: Validate Flatpak metadata
        working-directory: harbor
        run: |
          set -euo pipefail
          flatpak/update-flatpak.sh --check
          desktop-file-validate flatpak/site.harbor.Harbor.desktop
          appstreamcli validate --no-net flatpak/site.harbor.Harbor.metainfo.xml
          flatpak-builder --show-manifest flatpak/site.harbor.Harbor.yml >/dev/null

      - name: Prepare Flatpak source
        working-directory: harbor
        run: |
          set -euo pipefail

          node <<'EOF'
          const fs = require('fs');
          const workspacePath = 'pnpm-workspace.yaml';
          let workspace = fs.readFileSync(workspacePath, 'utf8');
          const setAllowBuild = (name, value) => {
            const entry = new RegExp(`^(\\s*)${name}:.*$`, 'm');
            if (entry.test(workspace)) {
              workspace = workspace.replace(entry, `$1${name}: ${value}`);
              return;
            }
            workspace = workspace.replace(/^allowBuilds:\s*$/m, `allowBuilds:\n  ${name}: ${value}`);
          };
          setAllowBuild('esbuild', 'true');
          setAllowBuild('protobufjs', 'false');
          fs.writeFileSync(workspacePath, workspace);
          EOF

      - name: Build Flatpak bundle
        working-directory: harbor
        env:
          CHANNEL: ${{ inputs.channel || 'stable' }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          flatpak-builder --user --force-clean --default-branch="${CHANNEL}" --repo=/tmp/harbor-flatpak-repo /tmp/harbor-flatpak-build flatpak/site.harbor.Harbor.yml
          flatpak build-bundle /tmp/harbor-flatpak-repo \
            "../Harbor_${VERSION}_x86_64.flatpak" \
            site.harbor.Harbor "${CHANNEL}"

      - name: Validate Flatpak bundle
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          ostree init --repo=/tmp/harbor-flatpak-validation-repo --mode=archive-z2
          flatpak build-import-bundle --update-appstream --no-update-summary \
            /tmp/harbor-flatpak-validation-repo \
            "Harbor_${VERSION}_x86_64.flatpak"

      - name: Attach Flatpak bundle to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          REPOSITORY: ${{ github.repository }}
          ASSET: Harbor_${{ steps.package.outputs.version }}_x86_64.flatpak
        run: gh release upload "${TAG}" "${ASSET}" --repo "${REPOSITORY}" --clobber
